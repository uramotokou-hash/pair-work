<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ペアトーク</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 600px; position: relative; }

        /* イラスト */
        .illustration { font-size: 3rem; margin-bottom: 10px; animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* タイトルと隠れスイッチ */
        h1 { color: #333; margin-bottom: 30px; position: relative; }
        #secret-switch { cursor: default; user-select: none; }

        /* 予約パネル (初期状態は非表示) */
        #reservation-panel { display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: white; border: 2px solid var(--primary); padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 100; font-size: 1rem; width: 80%; }
        #reservation-panel select { padding: 8px; font-size: 1rem; width: 100%; margin-top: 10px; }
        #reservation-status { font-size: 0.8rem; color: var(--danger); margin-top: 5px; min-height: 1.2em; }

        /* 抽選エリア */
        #display { font-size: 2.5rem; font-weight: bold; height: 120px; display: flex; align-items: center; justify-content: center; border: 4px dashed #ddd; border-radius: 15px; margin-bottom: 20px; padding: 10px; color: var(--primary); }

        /* タイマーエリア */
        #timer-container { position: relative; width: 100%; height: 120px; margin: 20px 0; }
        #timer-text { font-size: 5rem; font-weight: bold; color: var(--danger); font-family: monospace; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .timer-meter-bg { position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background-color: #eee; border-radius: 5px; }
        .timer-meter-fg { height: 100%; background-color: var(--primary); border-radius: 5px; width: 100%; transition: width 1s linear; }

        /* ボタン類 */
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; margin: 5px; color: white; font-weight: bold; }
        .btn-start { background: var(--primary); }
        .btn-stop { background: var(--danger); visibility: hidden; }
        button:hover { opacity: 0.8; transform: scale(1.05); }

        /* おまけ仕掛け */
        #bonus { display: none; margin-top: 20px; padding: 20px; background: #e8f4fd; border-left: 5px solid var(--primary); border-radius: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 感情リフレクション */
        #emotion-reflection { display: none; margin-top: 30px; padding: 30px; background-color: white; border-top: 4px solid var(--success); border-radius: 15px; animation: fadeIn 0.5s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #emotion-reflection h3 { color: #333; margin-top: 0; }
        .emotion-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .emotion-btn { font-size: 1.1rem; padding: 15px; border-radius: 10px; color: #333; font-weight: bold; }
        .emotion-btn:hover { background-color: rgba(255, 255, 255, 0.8); }
        .btn-happy      { background-color: #ffff88; }
        .btn-sad        { background-color: #88ffff; }
        .btn-refreshed  { background-color: #88ff88; }
        .btn-surprise   { background-color: #ffcc88; }
        .btn-grey       { background-color: #cccccc; }
        .btn-worry      { background-color: #ccbbff; }
        .btn-satisfy    { background-color: #ffffcc; }
        .btn-interested { background-color: #aaddff; }
        .btn-other      { background-color: #eeeeee; }
        .btn-home { background: #888; margin-top: 25px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="illustration">🏫 👦💬👧 ☀️</div>
    <h1><span id="secret-switch" onclick="toggleReservation()">☀️</span> ペアトーク</h1>
    <p>トークテーマを<ruby>引<rt>ひ</rt></ruby>いてみよう！</p>

    <div id="reservation-panel">

        <select id="reserve-select" onchange="setReservation()">
            <option value="">ランダム（予約なし）</option>
        </select>
        <div id="reservation-status"></div>
    </div>

    <div id="display">ボタンをおしてね！</div>

    <div id="timer-container">
        <div id="timer-text">50</div>
        <div class="timer-meter-bg"><div id="timer-meter" class="timer-meter-fg"></div></div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-start" onclick="startLottery()"><ruby>抽選<rt>ちゅうせん</rt></ruby>スタート！</button>
        <button id="stopBtn" class="btn-stop" onclick="forceEnd()"><ruby>終了<rt>しゅうりょう</rt></ruby>・リセット</button>
    </div>

    <div id="bonus">

        <p id="bonus-task"></p>
    </div>

    <div id="emotion-reflection" class="reflection-section">
        <h3>💬 ワークのあとは<ruby>気持<rt>きも</rt></ruby>ちをきき<ruby>合<rt>あ</rt></ruby>おう 💬</h3>
        <p>いまの<ruby>気持<rt>きも</rt></ruby>ちはどれかな？ペアできき<ruby>合<rt>あ</rt></ruby>ってみよう。</p>
        <div class="emotion-grid">
            <button class="emotion-btn btn-happy">😊 うれしい</button>
            <button class="emotion-btn btn-sad">😢 かなしい</button>
            <button class="emotion-btn btn-refreshed">😌 すっきり</button>
            <button class="emotion-btn btn-surprise">😮 おどろき</button>
            <button class="emotion-btn btn-grey">😑 もやもや</button>
            <button class="emotion-btn btn-worry">😟 しんぱい</button>
            <button class="emotion-btn btn-satisfy">🥰 まんぞく</button>
            <button class="emotion-btn btn-interested">🤔 <ruby>気<rt>き</rt></ruby>になる</button>
            <button class="emotion-btn btn-other">❓ その<ruby>他<rt>た</rt></ruby></button>
        </div>
        <button class="btn-home" onclick="goHome()">🏠 ホームにもどる</button>
    </div>
</div>

    // ④ 選んだ瞬間にパネルを自動で閉じる

    function startLottery() {
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        document.getElementById('reservation-panel').style.display = 'none';
        document.getElementById('bonus').style.display = 'none';
        document.getElementById('emotion-reflection').style.display = 'none';
        startBtn.style.visibility = 'hidden';
        stopBtn.style.visibility = 'visible';

        let count = 0;
        let shuffle = setInterval(() => {
            display.innerHTML = tasks[Math.floor(Math.random() * tasks.length)];
            count++;
            if (count > 15) {
                clearInterval(shuffle);
                if (reservedTask !== "") {
                    display.innerHTML = reservedTask;
                    reservedTask = "";
                    document.getElementById('reserve-select').value = "";
                    document.getElementById('reservation-status').innerHTML = "";
                } else {
                    display.innerHTML = tasks[Math.floor(Math.random() * tasks.length)];
                }
                startTimer();
                // ① タイマースタートと同時におまけを表示
                document.getElementById('bonus-task').innerHTML = bonusTasks[Math.floor(Math.random() * bonusTasks.length)];
                document.getElementById('bonus').style.display = 'block';
            }
        }, 100);
    }

    function startTimer() {
        timeLeft = maxTime;
        document.getElementById('timer-text').innerText = timeLeft;
        updateMeter();

        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = timeLeft;
            updateMeter();
            if (timeLeft <= 0) {
                endWork();
            }
        }, 1000);
    }

    function updateMeter() {
        document.getElementById('timer-meter').style.width = (timeLeft / maxTime) * 100 + '%';
    }

    // ③ 時間切れ → 振り返り全画面へ
    function endWork() {
        clearInterval(timerId);
        playChimeShort();
        showReflectionFullScreen();
    }

    // ① 終了・リセット → 振り返り全画面へ（タイマー停止 + チャイム）
    function forceEnd() {
        clearInterval(timerId);
        playChimeShort();
        showReflectionFullScreen();
    }

    // ② チャイムを再生し、1.5秒後にフェードアウトして停止
    function playChimeShort() {
        const chime = document.getElementById('chime');
        chime.currentTime = 0;
        chime.volume = 1;
        chime.play();
        setTimeout(() => {
            let vol = 1;
            const fade = setInterval(() => {
                vol -= 0.1;
                if (vol <= 0) {
                    chime.pause();
                    chime.currentTime = 0;
                    chime.volume = 1;
                    clearInterval(fade);
                } else {
                    chime.volume = vol;
                }
            }, 30);
        }, 1500);
    }

    // ③ 振り返り全画面表示（ワーク要素を隠す）
    function showReflectionFullScreen() {
        document.querySelector('.illustration').style.display = 'none';
        document.querySelector('h1').style.display = 'none';
        document.getElementById('display').style.display = 'none';
        document.getElementById('timer-container').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('bonus').style.display = 'none';
        document.getElementById('emotion-reflection').style.display = 'block';
    }

    // ③ ホームに戻る（全リセット）
    function goHome() {
        const chime = document.getElementById('chime');
        chime.pause();
        chime.currentTime = 0;
        chime.volume = 1;
        document.getElementById('emotion-reflection').style.display = 'none';
        document.querySelector('.illustration').style.display = 'block';
        document.querySelector('h1').style.display = 'block';
        document.getElementById('display').style.display = 'flex';
        document.getElementById('timer-container').style.display = 'block';
        document.querySelector('.controls').style.display = 'block';
        document.getElementById('bonus').style.display = 'none';
        document.getElementById('timer-text').innerText = maxTime;
        document.getElementById('timer-meter').style.width = '100%';
        document.getElementById('display').innerText = "ボタンをおしてね！";
        document.getElementById('startBtn').style.visibility = 'visible';
        document.getElementById('stopBtn').style.visibility = 'hidden';
    }
</script>

</body>
</html>
